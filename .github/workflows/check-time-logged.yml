name: Check Time Logged

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-time:
    name: Validate Time Entry
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check for time entry
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/^hours:\s*(\d+\.?\d*)/m);

            if (!match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '⛔ **Time entry required.** Please update the PR description with your hours.\n\nExample:\n```\nhours: 2.5\n```'
              });
              core.setFailed('Missing or invalid time entry. Add "hours: <number>" to the PR description.');
              return;
            }

            const hours = parseFloat(match[1]);
            if (hours <= 0) {
              core.setFailed('Hours must be greater than 0.');
              return;
            }

            core.info(`Time logged: ${hours} hours`);
